# helm install monitoring prometheus-community/kube-prometheus-stack -f prometheus-values.yaml
grafana:
  adminPassword: "REPLACE_ME_AT_INSTALL_TIME"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: helios
          folder: Helios
          type: file
          options:
            path: /var/lib/grafana/dashboards/helios
  dashboardsConfigMaps:
    helios: helios-grafana-dashboard

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: "helios-api"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["helios"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
    ruleSelectorNilUsesHelmValues: false

# This file is a TEMPLATE ONLY — never commit real secret values to git.
#
# How secrets actually flow in this project:
#   1. Real values (database URI, JWT signing secret, third-party API
#      keys) live in the cluster only, created via:
#        kubectl create secret generic helios-secrets \
#          --from-literal=MONGO_URI=... \
#          --from-literal=JWT_SECRET=... \
#          -n helios
#   2. For a GitOps-clean workflow (secrets committed but encrypted),
#      use Bitnami Sealed Secrets: encrypt with `kubeseal`, commit the
#      resulting SealedSecret CRD — only the in-cluster controller can
#      decrypt it. That's the version ArgoCD actually syncs.
#   3. Never store secrets in plain Kubernetes Secret YAML in git — they're
#      only base64, not encrypted, and this is a common interview question
#      ("how do you store DB passwords?") — the answer is Sealed Secrets
#      or an external secret manager (AWS Secrets Manager / Vault), not
#      committing .env-equivalents to the repo.
apiVersion: v1
kind: Secret
metadata:
  name: helios-secrets
type: Opaque
stringData:
  MONGO_URI: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"

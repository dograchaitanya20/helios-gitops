name: CI/CD — Build, Scan, Publish, Trigger GitOps Sync

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/ci-cd.yaml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/helios-api

jobs:
  # ---------------------------------------------------------------------
  # 1) Test — never build/deploy code that doesn't pass its own tests
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        run: npm install

      - name: Run unit/integration tests
        run: npm test

  # ---------------------------------------------------------------------
  # 2) Build + scan — only runs on main (PRs stop after tests)
  # ---------------------------------------------------------------------
  build-scan-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: meta
        run: echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (loaded locally for scanning first)
        uses: docker/build-push-action@v7
        with:
          context: ./app
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}

      # DevSecOps gate: block the pipeline on CRITICAL/HIGH vulnerabilities
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
          format: table
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Push image (only if scan passed)
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ---------------------------------------------------------------------
  # 3) GitOps handoff — this is the actual "GitOps" part.
  #    CI does NOT deploy. It only updates the manifest with the new
  #    image tag and commits it. ArgoCD (running in-cluster) detects the
  #    git change and reconciles the cluster to match. CI never talks
  #    to the cluster directly.
  # ---------------------------------------------------------------------
  update-manifest:
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set new image tag in Kustomize overlay
        run: |
          cd k8s/overlays/production
          # yq/kustomize edit set image — pins the exact tag ArgoCD will sync
          curl -sSLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/latest/download/kustomize_linux_amd64
          chmod +x kustomize 2>/dev/null || true
          ./kustomize edit set image \
            ghcr.io/${{ github.repository }}/helios-api=ghcr.io/${{ github.repository }}/helios-api:${{ needs.build-scan-push.outputs.image_tag }} || \
          sed -i "s|newTag:.*|newTag: ${{ needs.build-scan-push.outputs.image_tag }}|" kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "chore(deploy): bump helios-api to ${{ needs.build-scan-push.outputs.image_tag }}" || echo "nothing to commit"
          git push
